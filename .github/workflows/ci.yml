name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Environment variables shared across jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Backend — lint (ruff)
  # ───────────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (no extras)
        run: uv sync --no-dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Backend — tests
  # ───────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    # PostgreSQL service container for pytest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: consensus
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: consensus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match the service container credentials
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: consensus
      POSTGRES_USER: consensus
      POSTGRES_PASSWORD: changeme
      POSTGRES_SCHEMA: consensus_app
      POSTGRES_SSL: "false"
      APP_ENV: development
      SECRET_KEY: ci-secret-not-for-prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: pip install uv

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential wget
          wget -q https://sourceforge.net/projects/ta-lib/files/ta-lib/0.4.0/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Install Python dependencies
        run: uv sync

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest --tb=short -q

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Alembic — verify no pending migrations
  # ───────────────────────────────────────────────────────────────────────────
  alembic-check:
    name: Alembic migration check
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: consensus
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: consensus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: consensus
      POSTGRES_USER: consensus
      POSTGRES_PASSWORD: changeme
      POSTGRES_SCHEMA: consensus_app
      POSTGRES_SSL: "false"
      APP_ENV: development
      SECRET_KEY: ci-secret-not-for-prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential wget
          wget -q https://sourceforge.net/projects/ta-lib/files/ta-lib/0.4.0/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Install Python dependencies
        run: uv sync

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Check no pending migrations
        run: |
          CURRENT=$(uv run alembic current 2>&1)
          echo "Current: $CURRENT"
          # Fail if current revision is not at head
          uv run alembic check

      - name: Generate migration SQL preview
        run: |
          uv run alembic upgrade head --sql 2>/dev/null > migration-preview.sql || true
          LINES=$(wc -l < migration-preview.sql)
          echo "Migration SQL preview: ${LINES} lines"
          head -60 migration-preview.sql

      - name: Upload migration SQL artifact
        uses: actions/upload-artifact@v4
        with:
          name: alembic-migration-sql
          path: backend/migration-preview.sql
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Frontend — lint + type-check
  # ───────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/web
        run: pnpm run lint

  # ───────────────────────────────────────────────────────────────────────────
  # 5. Frontend — production build
  # ───────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: next build
        working-directory: apps/web
        env:
          # Provide stub Clerk keys so the build doesn't fail on missing env vars.
          # These are build-time placeholders only — not used at runtime.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_build
          CLERK_SECRET_KEY: sk_test_placeholder_for_ci_build
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /app/rankings
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /app/rankings
        run: pnpm run build

  # ───────────────────────────────────────────────────────────────────────────
  # 6. Playwright e2e — smoke tests against a local Next.js dev server
  # ───────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: apps/web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_e2e
          CLERK_SECRET_KEY: sk_test_placeholder_for_ci_e2e
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /app/rankings
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /app/rankings
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
